name: Dev CI

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development

jobs:
  backend:
    name: Backend Build (Dev)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: sa
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DB_URL: jdbc:postgresql://localhost:5432/testdb
      DB_USERNAME: sa
      DB_PASSWORD: password
      DB_CLASS_NAME: org.postgresql.Driver
      MBAJK_API_KEY: dummy
      OPEN_WEATHERMAP_API_KEY: dummy
      SUPABASE_URL: http://dummy
      SUPABASE_SERVICE_KEY: dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=MikeDQG_sibam -Dspring.profiles.active=ci


  frontend:
    name: Frontend Build (Dev)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_FIREBASE_API_KEY: dummy
      VITE_FIREBASE_AUTH_DOMAIN: dummy
      VITE_FIREBASE_PROJECT_ID: dummy
      VITE_FIREBASE_STORAGE_BUCKET: dummy
      VITE_FIREBASE_MESSAGING_SENDER_ID: dummy
      VITE_FIREBASE_APP_ID: dummy

      VITE_SUPABASE_PUBLISHABLE_KEY: dummy
      VITE_SUPABASE_URL: dummy

      VITE_GOOGLE_MAPS_API_KEY: dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
