spring.application.name=sibam
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.profiles.active=local
spring.task.scheduling.pool.size=2
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
server.port=${PORT:8080}

logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm=WARN

allowed.origins=http://localhost:5173,http://localhost:4173

cache.local-root=data/cache
supabase.cache.bucket=${SUPABASE_CACHE_BUCKET:cache}
supabase.cache.enabled=false
graph.cache.enabled=true

# Polyline encoding: ENCODED_POLYLINE or GEO_JSON_LINESTRING
routes.google.polyline-encoding=GEO_JSON_LINESTRING
# Field mask must match encoding choice
# For GEO_JSON_LINESTRING:
#   routes.legs.steps,routes.duration,routes.distanceMeters,routes.polyline.geoJsonLinestring
# For ENCODED_POLYLINE:
#   routes.legs.steps,routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline
routes.google.field-mask=routes.legs.steps,routes.duration,routes.distanceMeters,routes.polyline.geoJsonLinestring

# Heuristic for routing:
routing.transfer-penalty-seconds=100
routing.bike-distance-threshold-meters=4000
routing.bike-long-distance-multiplier=2.0
routing.walk-long-distance-multiplier=3.0
routing.bike-short-distance-multiplier=1.5
routing.max-access-distance-meters=3000
routing.weather.rain-walk-multiplier=2.0
routing.weather.rain-bike-multiplier=5.0
routing.weather.rain-transfer-penalty-multiplier=0.5
routing.weather.rain-max-walk-distance-meters=500
routing.weather.rain-threshold-millimeters=0.0
routing.weather.freezing-temperature-celsius=0.0
routing.weather.cool-temperature-celsius=10.0
routing.weather.hot-temperature-celsius=30.0
routing.weather.freezing-walk-multiplier=1.5
routing.weather.freezing-bike-multiplier=2.0
routing.weather.cool-walk-multiplier=1.2
routing.weather.cool-bike-multiplier=1.3
routing.weather.hot-walk-multiplier=1.3
routing.weather.hot-bike-multiplier=1.1
compute.path.max-alternatives=3
routing.alternatives.max-similarity=0.8
routing.alternatives.max-slowdown-multiplier=1.4
routing.alternatives.node-penalty-seconds=180

schedules.refresh.enabled=false
schedules.cache.days-ahead=6
schedules.refresh.days-ahead=6
schedules.refresh.cron=0 0 3 * * *
schedules.refresh.zone=Europe/Ljubljana
fallback.realtime-max-age-minutes=60
