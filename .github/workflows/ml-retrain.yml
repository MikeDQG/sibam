name: ML Retrain

on:
    schedule:
        - cron: "0 2 * * *" # vsako noč ob 2:00 UTC (3:00 Ljubljana)
    workflow_dispatch: # možnost ročnega zagona

jobs:
    retrain:
        name: Retrain Models
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ml

        env:
            SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
            SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: pip
                  cache-dependency-path: ml/requirements.txt

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Export to lake
              run: python export_to_lake.py

            - name: Transform to silver
              run: python transform_to_silver.py

            - name: Train bikes
              run: python train_bikes.py

            - name: Train buses
              run: python train_buses.py
