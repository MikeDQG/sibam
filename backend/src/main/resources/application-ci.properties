spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_CLASS_NAME}

mbajk.api.key=${MBAJK_API_KEY}

openweathermap.api.key=${OPEN_WEATHERMAP_API_KEY}

schedulers.fetch-bike-ingestion.on=true
schedulers.fetch-weather-ingestion.on=true
schedulers.fetch-bus-ingestion.on=true

# When true, the application will skip graph building and VAO graph-data ingestion
# and only run scheduled jobs intended for ML data collection.
app.ml-only-scheduled-ingestion=true
