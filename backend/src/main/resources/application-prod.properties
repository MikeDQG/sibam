spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_CLASS_NAME}

# HikariCP - tuned for Supabase transaction pooler
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=120000

mbajk.api.key=${MBAJK_API_KEY}

openweathermap.api.key=${OPEN_WEATHERMAP_API_KEY}

supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:${SUPABASE_SERVICE_KEY}}
supabase.cache.enabled=true

allowed.origins=${ALLOWED_ORIGINS}

schedulers.fetch-bike-ingestion.on=false
schedulers.fetch-weather-ingestion.on=false
schedulers.fetch-bus-ingestion.on=false

app.ml-only-scheduled-ingestion=false
app.ml-only-scheduled-logs-on=false

routes.google.polyline-encoding=${ROUTES_GOOGLE_POLYLINE_ENCODING}
routes.google.field-mask=${ROUTES_GOOGLE_FIELD_MASK}
routes.google.api-key=${ROUTES_GOOGLE_API_KEY}

schedules.refresh.enabled=true
