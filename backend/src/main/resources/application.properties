spring.application.name=sibam
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.profiles.active=local
spring.task.scheduling.pool.size=2
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
server.port=${PORT:8080}

logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm=WARN

# Polyline encoding: ENCODED_POLYLINE or GEO_JSON_LINESTRING
routes.google.polyline-encoding=GEO_JSON_LINESTRING
# Field mask must match encoding choice
# For GEO_JSON_LINESTRING:
#   routes.duration,routes.distanceMeters,routes.polyline.geoJsonLinestring
# For ENCODED_POLYLINE:
#   routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline
routes.google.field-mask=routes.duration,routes.distanceMeters,routes.polyline.geoJsonLinestring