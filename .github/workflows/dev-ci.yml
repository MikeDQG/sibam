name: Dev CI

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development

jobs:
  backend:
    name: Backend Build (Dev)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DB_URL: jdbc:h2:mem:testdb
      DB_USERNAME: sa
      DB_PASSWORD: ""
      DB_CLASS_NAME: org.h2.Driver

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build backend (no tests)
        run: ./mvnw clean package -DskipTests


  frontend:
    name: Frontend Build (Dev)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_FIREBASE_API_KEY: dummy
      VITE_FIREBASE_AUTH_DOMAIN: dummy
      VITE_FIREBASE_PROJECT_ID: dummy
      VITE_FIREBASE_STORAGE_BUCKET: dummy
      VITE_FIREBASE_MESSAGING_SENDER_ID: dummy
      VITE_FIREBASE_APP_ID: dummy

      VITE_SUPABASE_PUBLISHABLE_KEY: dummy
      VITE_SUPABASE_URL: dummy

      VITE_GOOGLE_MAPS_API_KEY: dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
