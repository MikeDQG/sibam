spring.application.name=sibam
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.profiles.active=local
spring.task.scheduling.pool.size=2
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
server.port=${PORT:8080}

logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm=WARN

# Polyline encoding: ENCODED_POLYLINE or GEO_JSON_LINESTRING
routes.google.polyline-encoding=GEO_JSON_LINESTRING
# Field mask must match encoding choice
# For GEO_JSON_LINESTRING:
#   routes.legs.steps,routes.duration,routes.distanceMeters,routes.polyline.geoJsonLinestring
# For ENCODED_POLYLINE:
#   routes.legs.steps,routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline
routes.google.field-mask=routes.legs.steps,routes.duration,routes.distanceMeters,routes.polyline.geoJsonLinestring

# Heuristic for routing:
routing.transfer-penalty-seconds=100
routing.bike-distance-threshold-meters=4000
routing.bike-long-distance-multiplier=2.0
routing.walk-long-distance-multiplier=3.0
routing.bike-short-distance-multiplier=1.5
